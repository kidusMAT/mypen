{% extends "account/base.html" %}
{% load i18n %}
{% load allauth %}

{% block head_title %}
{% trans "Change Password" %}
{% endblock head_title %}

{% block content %}
<main class="edit-profile-page" style="padding: 100px 0; background: #f9fafb; min-height: 80vh;">
    <div class="edit-container" style="max-width: 500px; margin: 0 auto; padding: 0 20px;">
        <div class="edit-card"
            style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);">
            <h1 style="font-size: 28px; margin-bottom: 10px;">{% trans "Change Password" %}</h1>
            <p class="subtitle" style="color: #666; margin-bottom: 30px;">Update your account security.</p>

            <form method="post" action="{% url 'account_change_password' %}" class="premium-form">
                {% csrf_token %}

                <style>
                    .premium-form ul {
                        list-style: none;
                        padding: 0;
                        margin-bottom: 20px;
                        color: #dc2626;
                        font-size: 13px;
                    }

                    .premium-form p {
                        margin-bottom: 20px;
                    }

                    .premium-form label {
                        display: block;
                        font-weight: 600;
                        margin-bottom: 8px;
                        font-size: 14px;
                    }

                    .premium-form input {
                        width: 100%;
                        padding: 12px;
                        border: 1px solid #ddd;
                        border-radius: 10px;
                        font-family: inherit;
                        transition: 0.3s;
                    }

                    .premium-form input:focus {
                        border-color: #111;
                        outline: none;
                        box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
                    }

                    .helptext {
                        display: block;
                        font-size: 12px;
                        color: #666;
                        margin-top: 5px;
                    }
                </style>

                {{ form.as_p }}

                <div class="form-actions" style="display: flex; gap: 15px; margin-top: 40px;">
                    <a href="{% url 'edit_profile' %}" class="btn-cancel"
                        style="flex: 1; padding: 14px; background: #fff; border: 1px solid #ddd; color: #666; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 600;">Back</a>
                    <button type="submit" name="action" class="btn-save"
                        style="flex: 2; padding: 14px; background: #111; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s;">
                        {% trans "Change Password" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock content %}
