{% for comment in comments %}
<div class="confession-comment" id="confession-comment-{{ comment.id }}">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <p>{{ comment.content }}</p>
        {% if user.is_staff or user == comment.user %}
        <button class="comment-delete-btn" onclick="deleteConfessionComment({{ comment.id }}, {{ confession.id }})"
            title="Delete Comment"
            style="background:none; border:none; color:#aaa; cursor:pointer; font-size: 0.8rem; padding: 0 5px;">
            <i class="fa-solid fa-trash-can"></i>
        </button>
        {% endif %}
    </div>
    <span class="comment-time">{{ comment.created_at|timesince }} ago</span>
</div>
{% empty %}
<div class="no-comments">No comments yet.</div>
{% endfor %}
